<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #2e3440; rx: 16px; }
    .grid { stroke: #4c566a; stroke-width: 1; stroke-dasharray: 4,4; }
    .axis { stroke: #d8dee9; stroke-width: 2; }
    .axis-arrow { fill: #d8dee9; }
    .label { font-family: 'Inter', sans-serif; font-size: 13px; fill: #d8dee9; }
    .title { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; fill: #88c0d0; text-anchor: middle; }
    .fit-line { stroke: #88c0d0; stroke-width: 3; stroke-linecap: round; }
    .data-point { fill: #bf616a; stroke: #eceff4; stroke-width: 1.5; }
    .callout-line { stroke: #a3be8c; stroke-width: 1.5; stroke-dasharray: 3,3; }
    .callout-text { font-family: 'Inter', sans-serif; font-size: 12px; fill: #a3be8c; }
    .slope-line { stroke: #ebcb8b; stroke-width: 1.5; }
    .slope-text { font-family: 'Inter', sans-serif; font-size: 11px; fill: #ebcb8b; }
  </style>

  <rect class="bg" width="600" height="400"/>

  <text class="title" x="300" y="30">Linear Regression Fit: T_k = k · t_exec + t_overhead + ε_k</text>

  <line class="grid" x1="80" y1="290" x2="540" y2="290"/>
  <line class="grid" x1="80" y1="245" x2="540" y2="245"/>
  <line class="grid" x1="80" y1="200" x2="540" y2="200"/>
  <line class="grid" x1="80" y1="155" x2="540" y2="155"/>
  <line class="grid" x1="80" y1="110" x2="540" y2="110"/>
  <line class="grid" x1="80" y1="65" x2="540" y2="65"/>

  <line class="axis" x1="80" y1="340" x2="80" y2="50"/>
  <polygon class="axis-arrow" points="80,45 76,55 84,55"/>
  <line class="axis" x1="80" y1="340" x2="550" y2="340"/>
  <polygon class="axis-arrow" points="555,340 545,336 545,344"/>

  <text class="label" x="95" y="60" font-weight="bold">Measured Time (T_k)</text>
  <text class="label" x="430" y="375" font-weight="bold">Repetitions (k)</text>

  <line class="axis" x1="160" y1="340" x2="160" y2="345"/>
  <text class="label" x="156" y="360">1</text>

  <line class="axis" x1="240" y1="340" x2="240" y2="345"/>
  <text class="label" x="236" y="360">2</text>

  <line class="axis" x1="320" y1="340" x2="320" y2="345"/>
  <text class="label" x="316" y="360">3</text>

  <line class="axis" x1="400" y1="340" x2="400" y2="345"/>
  <text class="label" x="396" y="360">4</text>

  <line class="axis" x1="480" y1="340" x2="480" y2="345"/>
  <text class="label" x="476" y="360">5</text>

  <text class="label" x="65" y="344">0</text>

  <line class="fit-line" x1="80" y1="290" x2="520" y2="101"/>

  <circle cx="80" cy="290" r="4" fill="#a3be8c"/>
  <line class="callout-line" x1="80" y1="290" x2="180" y2="290"/>
  <text class="callout-text" x="190" y="294">Intercept (b) = t_overhead (Timer overhead)</text>

  <line class="slope-line" x1="320" y1="155" x2="400" y2="155" stroke-dasharray="2,2"/>
  <text class="slope-text" x="350" y="172">Run = 1</text>
  <line class="slope-line" x1="400" y1="155" x2="400" y2="110"/>
  <text class="slope-text" x="410" y="138">Rise = Slope (m) = t_exec</text>

  <circle class="data-point" cx="160" cy="251" r="6"/>
  <line stroke="#bf616a" stroke-width="1" x1="160" y1="245" x2="160" y2="251"/>

  <circle class="data-point" cx="240" cy="194" r="6"/>
  <line stroke="#bf616a" stroke-width="1" x1="240" y1="200" x2="240" y2="194"/>

  <circle class="data-point" cx="320" cy="163" r="6"/>
  <line stroke="#bf616a" stroke-width="1" x1="320" y1="155" x2="320" y2="163"/>

  <circle class="data-point" cx="400" cy="104" r="6"/>
  <line stroke="#bf616a" stroke-width="1" x1="400" y1="110" x2="400" y2="104"/>

  <circle class="data-point" cx="480" cy="62" r="6"/>
  <line stroke="#bf616a" stroke-width="1" x1="480" y1="65" x2="480" y2="62"/>

  <rect x="360" y="215" width="200" height="90" rx="8" fill="#3b4252" stroke="#4c566a" stroke-width="1.5"/>
  <circle class="data-point" cx="380" cy="235" r="5"/>
  <text class="label" x="400" y="239">Data Point (k, T_k)</text>

  <line class="fit-line" x1="370" y1="260" x2="390" y2="260"/>
  <text class="label" x="400" y="264">Fitted Line (Slope = t_exec)</text>

  <line stroke="#bf616a" stroke-width="1" x1="380" y1="280" x2="380" y2="290"/>
  <circle cx="380" cy="285" r="2" fill="#bf616a"/>
  <text class="label" x="400" y="289">Random Error (ε_k)</text>
</svg>
