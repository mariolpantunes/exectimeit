name: Python CI

on:
  push:
    branches: [main, wip]
  pull_request:
    branches: [main, wip]

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Run tests with unittest
        run: python3 -m unittest discover -s test

  docs:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pdoc
        run: pip install pdoc
      - name: Build documentation
        run: |
          PYTHONPATH=src pdoc --math -d google -o docs exectimeit \
            --logo "assets/logo.svg" \
            --favicon "assets/logo.svg"
      - name: Verify logo in docs
        run: |
          if [ ! -f docs/exectimeit/assets/logo.svg ]; then
            mkdir -p docs/exectimeit/assets
            cp assets/logo.svg docs/exectimeit/assets/logo.svg
          fi
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          branch: gh-pages
